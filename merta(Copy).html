<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Merta Store | Pembayaran 


 Modern</title>
    <!-- Font Poppins & Fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* mencegah seleksi acak, tetap terlihat premium */
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: #0a192f; /* fallback warna gelap biru */
            min-height: 100vh;
        }

        /* ========== LOADING SCREEN ========== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b2b44, #051b2f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(0px);
            transition: opacity 1s ease, visibility 1s ease;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(135, 206, 250, 0.2);
            border-top: 5px solid #7ad0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(90, 180, 255, 0.6);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #c3e2ff;
            font-weight: 500;
            letter-spacing: 2px;
            font-size: 1.3rem;
            text-shadow: 0 0 8px #3b9eff;
        }

        /* ========== MAIN WEBSITE (awal tersembunyi) ========== */
        .main-website {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 0.2s;
            position: relative;
            min-height: 100vh;
            width: 100%;
        }

        .main-website.active {
            opacity: 1;
            visibility: visible;
        }

        /* Background video container */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Overlay transparan biru aesthetic */
        .overlay-blue {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 110, 180, 0.35); /* biru langit transparan */
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* Efek partikel bintang biru (canvas) */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Konten utama */
        .container {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Glassmorphism card modern */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 30px rgba(70, 170, 255, 0.2);
            padding: 2.2rem 2rem 2rem 2rem;
            width: 100%;
            max-width: 550px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s;
        }

        .glass-card:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25), 0 0 35px rgba(70, 200, 255, 0.5);
        }

        /* QRIS gambar utama */
        .qris-wrapper {
            position: relative;
            margin: 20px auto;
            display: inline-block;
            transition: all 0.4s ease;
        }

        .qris-img {
            width: 280px;
            height: auto;
            max-width: 85vw;
            border-radius: 32px;
            background: white;
            padding: 12px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255,255,255,0.4), 0 0 0 5px rgba(77, 181, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* Animasi denyut/glow pada QRIS */
        .qris-img {
            animation: gentleGlow 2.2s infinite alternate ease-in-out;
        }

        @keyframes gentleGlow {
            0% {
                box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.3), 0 0 0 4px rgba(50, 150, 255, 0.3);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 25px 40px -8px rgba(0,0,0,0.4), 0 0 0 3px rgba(255,255,255,0.6), 0 0 0 12px rgba(70, 180, 255, 0.5);
                transform: scale(1.01);
            }
        }

        .qris-wrapper:hover .qris-img {
            animation: none;
            transform: scale(1.02);
            box-shadow: 0 30px 45px -8px black, 0 0 0 4px #fff, 0 0 0 18px rgba(80, 200, 255, 0.6);
            transition: all 0.25s;
        }

        /* teks utama */
        .scan-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #b3e0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
            text-shadow: 0 0 10px rgba(0,160,255,0.5);
        }

        .sub-text {
            color: #f0f9ff;
            font-weight: 500;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* tombol download kecil */
        .btn-download {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,240,0.6);
            padding: 8px 20px;
            margin-top: 18px;
            border-radius: 40px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .btn-download:hover {
            background: rgba(70, 160, 255, 0.6);
            border-color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* footer kecil */
        .footer {
            position: fixed;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,245,235,0.8);
            font-weight: 400;
            letter-spacing: 1px;
            z-index: 10;
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.2);
            padding: 4px 0;
        }

        /* tombol music float */
        .music-toggle {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 100;
            background: rgba(15, 50, 80, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 10px 16px;
            color: white;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,210,0.5);
            transition: 0.2s;
            box-shadow: 0 5px 14px rgba(0,0,0,0.2);
        }

        .music-toggle:hover {
            transform: scale(1.05);
            background: #1e6bb5;
        }

        /* responsive */
        @media (max-width: 640px) {
            .glass-card {
                padding: 1.5rem;
                border-radius: 36px;
            }
            .scan-title {
                font-size: 1.7rem;
            }
            .qris-img {
                width: 240px;
            }
            .music-toggle {
                bottom: 70px;
                right: 15px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Payment...</div>
    </div>

    <!-- MAIN WEBSITE -->
    <div id="mainWebsite" class="main-website">
        <!-- Video Background (bisa diganti link) -->
        <video id="bgVideo" class="video-bg" autoplay loop muted playsinline>
            <!-- GANTI VIDEO: ubah src dibawah dengan link video pilihan Anda (MP4) -->
            <source src="https://files.catbox.moe/c4rpp0.mp4 " type="video/mp4">
            <!-- fallback jika video tidak bisa, tetap ada overlay biru cantik -->
        </video>
        
        <!-- Overlay biru transparan aesthetic (warna tema mudah diubah) -->
        <div class="overlay-blue" style="background: rgba(50, 130, 200, 0.4); backdrop-filter: blur(2px);"></div>
        
        <!-- Canvas partikel bintang biru -->
        <canvas id="particle-canvas"></canvas>
        
        <!-- Konten utama -->
        <div class="container">
            <div class="glass-card">
                <h1 class="scan-title">SCAN QRIS</h1>
                <p class="sub-text">Pembayaran Otomatis Merta Store</p>
                
                <div class="qris-wrapper">
                    <!-- GANTI FOTO QRIS: ubah src dengan link gambar QRIS anda -->
                    <img id="qrisImage" class="qris-img" src="https://files.catbox.moe/o5udp0.jpg" alt="QRIS Merta Store">
                </div>
                
                <!-- Tombol download QRIS -->
                <button id="downloadQRISBtn" class="btn-download">
                    ⬇️ Download QRIS
                </button>
            </div>
        </div>
        
        <div class="footer">
            © Merta Store Payment
        </div>
        
        <!-- Tombol music ON/OFF mengambang -->
        <div id="musicToggleBtn" class="music-toggle">
            🎵 MUSIC ON
        </div>
        
        <!-- Audio latar (autoplay dengan kebijakan modern: perlu interaksi? namun kita paksa autoplay via user interaction? 
        karena browser blok autoplay tanpa interaksi, kita akan play setelah loading selesai dengan cara 'play' promise.
        Dan pengguna bisa toggle. -->
        <audio id="bgMusic" loop preload="auto">
            <!-- GANTI MUSIK: ganti src dengan link file musik Anda (MP3) -->
            <source src="https://files.catbox.moe/jnb98a.mp3">
        </audio>
    </div>

    <script>
        (function(){
            // ========== KONFIGURASI MUDAH DIGANTI ==========
            // 1. Ganti background video : ubah src video di element video (ID bgVideo)
            // 2. Ganti musik : ubah src di element audio (ID bgMusic)
            // 3. Ganti foto QRIS : ubah src gambar (ID qrisImage)
            // 4. Ganti warna tema : ubah properti overlay-blue & gradient teks dll di css (atau ganti via variable)
            // ==============================================
            
            // Elemen loading & main
            const loadingScreen = document.getElementById('loadingScreen');
            const mainWebsite = document.getElementById('mainWebsite');
            const bgMusic = document.getElementById('bgMusic');
            const musicToggleBtn = document.getElementById('musicToggleBtn');
            
            // State musik; default ingin autoplay setelah loading, tapi butuh interaksi pengguna terlebih dahulu?
            // Karena browser memblokir autoplay tanpa interaksi sebelumnya, kita akan menampilkan loading 4 detik, lalu
            // setelah halaman muncul kita coba play audio dengan promise, jika gagal karena Autoplay policy,
            // kita pasang interaksi tombol dan juga tooltip. Tapi untuk UX lebih baik: setelah loading selesai,
            // pengguna klik sedikit area atau tombol? namun spesifikasi "Musik otomatis diputar saat pengguna masuk ke website"
            // Kita akan coba play otomatis, jika tidak diizinkan browser, tombol tetap ON/OFF dan pengguna bisa nyalakan manual.
            // Agar sesuai harapan: Kami akan mencoba play setelah fade-in selesai, dan jika gagal, beri tanda di konsol tapi tombol menunjukkan OFF.
            let musicPlaying = false;
            
            // Inisialisasi partikel bintang biru bergerak pelan
            const canvas = document.getElementById('particle-canvas');
            let ctx = canvas.getContext('2d');
            let particles = [];
            let animationId = null;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.5 + 1.2;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.2 + 0.2;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.color = `rgba(100, 200, 255, ${this.opacity})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.y > canvas.height) this.y = -5;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "#3b9eff";
                }
            }
            
            function initParticles(count = 60) {
                particles = [];
                for(let i=0; i<count; i++) {
                    particles.push(new Particle());
                }
            }
            
            function animateParticles() {
                if(!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.shadowBlur = 0;
                for(let p of particles) {
                    p.update();
                    p.draw();
                }
                animationId = requestAnimationFrame(animateParticles);
            }
            
            function startParticles() {
                resizeCanvas();
                initParticles(80);
                animateParticles();
            }
            
            window.addEventListener('resize', () => {
                if(canvas) {
                    resizeCanvas();
                    initParticles(80);
                }
            });
            
            // ========== PROSES LOADING 4 DETIK + FADE OUT ==========
            setTimeout(() => {
                // fading loading screen
                if(loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.visibility = 'hidden';
                    // setelah transisi, tampilkan main
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        mainWebsite.classList.add('active');
                        // mulai partikel setelah tampil
                        startParticles();
                        
                        // Coba putar musik otomatis
                        const autoPlayMusic = () => {
                            bgMusic.volume = 0.5;
                            bgMusic.play().then(() => {
                                musicPlaying = true;
                                musicToggleBtn.innerHTML = '🔊 MUSIC ON';
                            }).catch((err) => {
                                console.warn("Autoplay dicegah browser, pengguna perlu klik tombol:", err);
                                musicPlaying = false;
                                musicToggleBtn.innerHTML = '🔇 MUSIC OFF';
                                // Tampilkan tooltip ringan? opsional
                            });
                        };
                        autoPlayMusic();
                        
                    }, 1000);
                }
            }, 2000); // 4 detik loading animasi
            
            // Toggle musik
            musicToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(musicPlaying) {
                    bgMusic.pause();
                    musicPlaying = false;
                    musicToggleBtn.innerHTML = '🔇 MUSIC OFF';
                } else {
                    bgMusic.play().then(() => {
                        musicPlaying = true;
                        musicToggleBtn.innerHTML = '🎵 MUSIC ON';
                    }).catch(err => {
                        console.log("Gagal memutar musik:", err);
                    });
                }
            });
            
            // Fungsi Download QRIS (berdasarkan gambar QRIS saat ini)
            const downloadBtn = document.getElementById('downloadQRISBtn');
            const qrisImgElement = document.getElementById('qrisImage');
            
            async function downloadQRIS() {
                try {
                    // Dapatkan src dari gambar qris
                    let imgSrc = qrisImgElement.src;
                    if(!imgSrc || imgSrc === "") {
                        alert("Gambar QRIS belum tersedia");
                        return;
                    }
                    // fetch gambar lalu download
                    const response = await fetch(imgSrc);
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = 'QRIS_MertaStore.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                } catch(e) {
                    // fallback: buat link download alternatif jika cross-origin atau error
                    // alternative: buat canvas?
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.src = qrisImgElement.src;
                    img.onload = () => {
                        const canvasTemp = document.createElement('canvas');
                        canvasTemp.width = img.width;
                        canvasTemp.height = img.height;
                        const ctxTemp = canvasTemp.getContext('2d');
                        ctxTemp.drawImage(img, 0, 0);
                        canvasTemp.toBlob(blob => {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'QRIS_MertaStore.png';
                            a.click();
                            URL.revokeObjectURL(url);
                        });
                    };
                    img.onerror = () => { alert("Gagal mengunduh QRIS, coba klik kanan pada gambar."); };
                }
            }
            
            if(downloadBtn) {
                downloadBtn.addEventListener('click', downloadQRIS);
            }
            
            // Gampangnya: ganti video dan QRIS secara dinamis sesuai komentar yang diharapkan developer.
            // Beri contoh mengganti via konsol developer? tapi sudah jelas di HTML elemen video dan img.
            // Sertakan instruksi di komentar kode agar pengguna mudah mengganti dari file/link:
            // 1. Untuk mengganti video fullscreen: ubah <source> di dalam <video id="bgVideo">
            // 2. Untuk mengganti musik: ubah <source> di dalam <audio id="bgMusic">
            // 3. Untuk mengganti foto QRIS: ubah src attribute di <img id="qrisImage">
            // 4. Untuk mengganti warna tema biru: edit class .overlay-blue background rgba atau gunakan root variable
            // Tambahan efek: animasi denyut sudah diberi, tombol download sangat intuitif.
            // Agar background video stabil saat loading di beberapa device, tambahkan event listener.
            
            // Sembunyikan audio autoplay error handling: jika user belum interaksi, tombol bekerja nanti.
            // Browser tidak izinkan autoplay di awal, tapi solusi tetap tumbuh interaksi via tombol music.
            // Karena fitur: Music ON/OFF mengambang tetap berfungsi. 
            // Selain itu halaman setelah loading smooth fade in, QRIS glow denyut + hover.
            // partikel bintang gerak pelan menambah elegant futuristik.
            
            // perbaiki jika video tidak autoplay atau suara musik mute karena policy?
            // user tetap bisa klik tombol musik.
            // Sediakan opsi agar video background terus loop mulus.
            const videoBg = document.getElementById('bgVideo');
            if(videoBg) {
                videoBg.play().catch(e => console.log("Video autoplay mungkin dicegah, tetap interactive"));
                videoBg.loop = true;
            }
            
            // Efek tambahan: Glassmorphism ringan, tombol download modern dan responsif.
            
            // small fix: pastikan setelah loading partikel berjalan lancar meski resize.
            window.addEventListener('resize', () => {
                if(canvas && mainWebsite.classList.contains('active')) {
                    resizeCanvas();
                    initParticles(80);
                }
            });
        })();
    </script>
</body>
</html>
